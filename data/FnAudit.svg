<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиентный фон -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Основной фон -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bgGradient)"/>
  
  <!-- Иконка документа -->
  <g transform="translate(64, 48)" filter="url(#shadow)">
    <!-- Лист бумаги -->
    <path d="M20,0 L100,0 L128,28 L128,148 L20,148 Z" fill="#ecf0f1"/>
    <path d="M100,0 L100,28 L128,28" fill="#bdc3c7"/>
    
    <!-- Линии текста -->
    <rect x="36" y="48" width="76" height="8" rx="2" fill="#3498db"/>
    <rect x="36" y="68" width="56" height="6" rx="2" fill="#95a5a6"/>
    <rect x="36" y="82" width="56" height="6" rx="2" fill="#95a5a6"/>
    <rect x="36" y="96" width="56" height="6" rx="2" fill="#95a5a6"/>
    
    <!-- Лупа (символ аудита) -->
    <g transform="translate(60, 80)">
      <circle cx="32" cy="32" r="24" fill="none" stroke="url(#iconGradient)" stroke-width="8"/>
      <line x1="50" y1="50" x2="68" y2="68" stroke="url(#iconGradient)" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Текст FA -->
  <text x="128" y="220" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#ecf0f1" text-anchor="middle" opacity="0.9">FA</text>
</svg>
